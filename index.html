<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0f" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#fafafa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="Nexa — Votre quartier, connecté.">
<title>Nexa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap">

<style>
/* ══════════════════════════════════════════════════════
   NEXA v2 — DESIGN SYSTEM
   ══════════════════════════════════════════════════ */
:root {
  /* Palette */
  --bg:            #fafafa;
  --bg2:           #f2f2f4;
  --bg3:           #e8e8ec;
  --surface:       rgba(250,250,250,0.88);
  --text:          #0d0d0f;
  --text2:         #6b6b78;
  --text3:         #a8a8b3;
  --border:        #e4e4eb;
  --accent:        #1a1a2e;
  --accent-rgb:    26,26,46;
  --accent-inv:    #ffffff;
  --accent2:       #6c3aff;
  --accent2-rgb:   108,58,255;
  --red:           #ff375f;
  --blue:          #2563eb;
  --green:         #22c55e;
  --orange:        #f97316;
  --gold:          #eab308;
  --shadow-xs:     0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:     0 2px 8px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:     0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:     0 8px 32px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
  --shadow-xl:     0 20px 60px rgba(0,0,0,.16), 0 8px 20px rgba(0,0,0,.08);
  /* Layout */
  --header-h:      58px;
  --nav-h:         64px;
  --safe-bottom:   env(safe-area-inset-bottom, 0px);
  /* Shape */
  --r-sm:          8px;
  --r:             14px;
  --r-lg:          20px;
  --r-pill:        999px;
  /* Motion */
  --ease:          .18s cubic-bezier(.4,0,.2,1);
  --spring:        .35s cubic-bezier(.34,1.56,.64,1);
  --spring-fast:   .22s cubic-bezier(.34,1.56,.64,1);
  /* Typography */
  --font-display:  'Syne', system-ui, sans-serif;
  --font-body:     'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #0d0d0f;
    --bg2:         #17171b;
    --bg3:         #222228;
    --surface:     rgba(17,17,21,0.92);
    --text:        #f0f0f5;
    --text2:       #8888a0;
    --text3:       #48485c;
    --border:      #252530;
    --accent:      #f0f0f5;
    --accent-rgb:  240,240,245;
    --accent-inv:  #0d0d0f;
    --shadow-xs:   0 1px 2px rgba(0,0,0,.2);
    --shadow-sm:   0 2px 8px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
    --shadow-md:   0 4px 16px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.2);
    --shadow-lg:   0 8px 32px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.3);
  }
}

/* ── RESET ─────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior: none;
  padding-top: var(--header-h);
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom));
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── ANIMATIONS ────────────────────────────────────── */
@keyframes spin         { to { transform: rotate(360deg); } }
@keyframes fadeIn       { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp      { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes slideDown    { from { transform: translateY(-10px); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes heartPop     { 0%,100% { transform: scale(1); } 30% { transform: scale(1.5); } 60% { transform: scale(.88); } }
@keyframes xpFloat      { 0% { transform: translateY(0) scale(1); opacity: 1; } 70% { opacity: 1; } 100% { transform: translateY(-60px) scale(.7); opacity: 0; } }
@keyframes shimmer      { from { background-position: -200% 0; } to { background-position: 200% 0; } }
@keyframes bounceIn     { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.15); } 80% { transform: scale(.95); } 100% { transform: scale(1); opacity: 1; } }
@keyframes pulse        { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

/* ── SKELETON ──────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s ease infinite;
  border-radius: var(--r-sm);
}

/* ══════════════════════════════════════════════════════
   SHARED COMPONENTS
   ══════════════════════════════════════════════════ */

/* ── HEADER ────────────────────────────────────────── */
#app-header {
  position: fixed; top: 0; inset-inline: 0;
  height: var(--header-h);
  background: var(--surface);
  backdrop-filter: saturate(1.8) blur(24px);
  -webkit-backdrop-filter: saturate(1.8) blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 900;
}
#app-header h1 {
  font-family: var(--font-display);
  font-size: 26px; font-weight: 800; letter-spacing: -1.5px;
  background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-actions { display: flex; gap: 2px; }

/* ── ICON BUTTON ───────────────────────────────────── */
.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 50%;
  color: var(--text); position: relative;
  transition: background var(--ease), transform var(--spring-fast);
}
.icon-btn:hover { background: var(--bg2); }
.icon-btn:active { background: var(--bg3); transform: scale(.88); }
.icon-btn .material-symbols-outlined { font-size: 22px; }

/* ── BADGE ─────────────────────────────────────────── */
.badge {
  position: absolute; top: 4px; right: 4px;
  background: var(--red); color: #fff;
  font-size: 9px; font-weight: 800; letter-spacing: 0;
  min-width: 16px; height: 16px;
  border-radius: var(--r-pill); padding: 0 4px;
  display: none; align-items: center; justify-content: center;
  border: 2px solid var(--bg);
  animation: bounceIn .3s ease forwards;
}
.badge.visible { display: flex; }

/* ── BOTTOM NAV ────────────────────────────────────── */
nav {
  position: fixed; bottom: 0; inset-inline: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--surface);
  backdrop-filter: saturate(1.8) blur(24px);
  -webkit-backdrop-filter: saturate(1.8) blur(24px);
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  z-index: 900;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 10px 4px 6px;
  color: var(--text3); cursor: pointer;
  font-size: 9.5px; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; position: relative;
  user-select: none; -webkit-user-select: none;
  transition: color var(--ease);
}
.nav-item.active { color: var(--accent2); }
.nav-item .material-symbols-outlined {
  font-size: 24px;
  transition: transform var(--spring-fast);
}
.nav-item.active .material-symbols-outlined { transform: scale(1.08); }
.nav-item:active .material-symbols-outlined { transform: scale(.82); }
.nav-item.active::after {
  content: '';
  position: absolute; bottom: 4px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent2);
  animation: bounceIn .25s ease;
}
.nav-badge {
  position: absolute; top: 9px; right: calc(50% - 18px);
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); border: 2px solid var(--bg);
  display: none;
}
.nav-badge.visible { display: block; }

/* ── VIEWS ─────────────────────────────────────────── */
.view {
  display: none; max-width: 640px; margin: 0 auto;
  min-height: calc(100dvh - var(--header-h) - var(--nav-h) - var(--safe-bottom));
  animation: fadeIn .15s ease;
}
.view.active { display: block; }

/* ── TOAST ─────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 14px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: var(--accent-inv);
  padding: 10px 20px; border-radius: var(--r-pill);
  font-size: 13.5px; font-weight: 600; letter-spacing: -.01em;
  z-index: 9990; opacity: 0; pointer-events: none;
  white-space: nowrap; max-width: calc(100vw - 32px);
  box-shadow: var(--shadow-lg);
  transition: opacity .2s, transform .25s var(--spring);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SPINNER ───────────────────────────────────────── */
.spinner {
  width: 22px; height: 22px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin .65s linear infinite;
  margin: 40px auto; display: block;
}
.spinner-sm { width: 16px; height: 16px; margin: 10px auto; border-width: 2px; }

/* ── EMPTY STATE ───────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 24px; color: var(--text3);
  animation: fadeIn .3s ease;
}
.empty-state .material-symbols-outlined {
  font-size: 52px; display: block; margin-bottom: 14px; opacity: .25;
}
.empty-state p { font-size: 15px; line-height: 1.6; color: var(--text2); white-space: pre-wrap; }
.empty-state .empty-cta { margin-top: 18px; display: inline-block; }

/* ── BUTTONS ───────────────────────────────────────── */
.btn-primary {
  width: 100%; padding: 14px;
  background: var(--accent); color: var(--accent-inv);
  border-radius: var(--r); font-weight: 700; font-size: 15px;
  letter-spacing: -.01em;
  transition: opacity var(--ease), transform var(--ease), box-shadow var(--ease);
  box-shadow: var(--shadow-sm);
}
.btn-primary:active { opacity: .8; transform: scale(.98); }
.btn-primary:disabled { opacity: .38; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-accent {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent2) 0%, #4f46e5 100%);
  color: #fff;
  border-radius: var(--r); font-weight: 700; font-size: 15px;
  letter-spacing: -.01em;
  transition: opacity var(--ease), transform var(--ease), box-shadow var(--ease);
  box-shadow: 0 4px 20px rgba(108,58,255,.3);
}
.btn-accent:active { opacity: .85; transform: scale(.98); }
.btn-accent:disabled { opacity: .38; cursor: not-allowed; }

.btn-outline {
  width: 100%; padding: 12px;
  background: transparent; border: 1.5px solid var(--border);
  color: var(--text); border-radius: var(--r);
  font-size: 14px; font-weight: 600;
  transition: background var(--ease), border-color var(--ease);
}
.btn-outline:hover { background: var(--bg2); border-color: var(--text3); }
.btn-outline:active { background: var(--bg3); }

/* ── FIELDS ────────────────────────────────────────── */
.field {
  width: 100%; padding: 13px 14px;
  background: var(--bg2); border: 1.5px solid var(--border);
  color: var(--text); border-radius: var(--r);
  font-size: 15px; outline: none; margin-bottom: 10px;
  transition: border-color var(--ease), box-shadow var(--ease), background var(--ease);
}
.field:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(var(--accent2-rgb),.12);
  background: var(--bg);
}

/* ── DIVIDER ───────────────────────────────────────── */
.divider { border: none; border-top: 6px solid var(--bg2); }

/* ══════════════════════════════════════════════════════
   AUTH SCREEN
   ══════════════════════════════════════════════════ */
#auth-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 48px 28px;
  animation: fadeIn .4s ease;
}
.auth-logo {
  font-family: var(--font-display);
  font-size: 60px; font-weight: 800; letter-spacing: -4px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent2) 0%, #4f46e5 50%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.auth-tagline {
  color: var(--text2); margin-bottom: 48px;
  font-size: 15px; letter-spacing: .01em;
}
.auth-form { width: 100%; max-width: 360px; }
.auth-error {
  color: var(--red); font-size: 13px; margin-bottom: 10px;
  min-height: 18px; text-align: center; font-weight: 500;
  animation: slideDown .2s ease;
}
#app-content { display: none; }

/* ══════════════════════════════════════════════════════
   FEED
   ══════════════════════════════════════════════════ */

/* ── Pull-to-refresh ───────────────────────────────── */
#ptr-indicator {
  position: fixed; top: var(--header-h);
  left: 50%; transform: translateX(-50%) translateY(-60px);
  background: var(--bg);
  border: 1px solid var(--border); border-radius: 24px;
  padding: 7px 16px 7px 10px;
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 600; color: var(--text2);
  box-shadow: var(--shadow-md);
  z-index: 850;
  transition: transform var(--spring), opacity .2s;
  opacity: 0; pointer-events: none;
}
#ptr-indicator.visible { opacity: 1; transform: translateX(-50%) translateY(10px); }
.ptr-spinner {
  width: 15px; height: 15px;
  border: 2px solid var(--border); border-top-color: var(--accent2);
  border-radius: 50%; animation: spin .6s linear infinite;
}
.ptr-arrow { font-size: 17px; transition: transform .28s; }
#ptr-indicator.pulling .ptr-arrow { transform: rotate(180deg); }

/* ── New posts banner ──────────────────────────────── */
#new-posts-banner {
  position: sticky; top: var(--header-h); z-index: 800;
  display: none; justify-content: center; padding: 12px 0;
}
#new-posts-banner.visible { display: flex; }
#new-posts-banner button {
  background: var(--accent2); color: #fff;
  border-radius: var(--r-pill);
  padding: 9px 22px; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 4px 20px rgba(var(--accent2-rgb),.4), 0 1px 3px rgba(0,0,0,.1);
  animation: slideDown .3s var(--spring);
  transition: transform var(--ease), box-shadow var(--ease);
}
#new-posts-banner button:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(var(--accent2-rgb),.5); }
#new-posts-banner button:active { transform: scale(.95); }
#new-posts-banner .material-symbols-outlined { font-size: 16px; }

/* ── Feed item ─────────────────────────────────────── */
.feed-item {
  border-bottom: 1px solid var(--border);
  padding: 15px 16px; display: flex; gap: 12px;
  animation: fadeIn .22s ease;
  transition: background var(--ease);
}
.feed-item:hover { background: rgba(var(--accent2-rgb), .02); }

/* ── Avatar ────────────────────────────────────────── */
.avatar {
  border-radius: 50%;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; cursor: pointer; overflow: hidden; flex-shrink: 0;
  transition: transform var(--spring-fast), opacity var(--ease);
  font-family: var(--font-display);
  color: var(--text2);
}
.avatar:hover { transform: scale(1.06); }
.avatar:active { opacity: .75; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ── Post content ──────────────────────────────────── */
.content-area { flex: 1; min-width: 0; }
.user-row {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 4px;
}
.user-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-width: 0; }
.username-wrap { display: flex; align-items: center; gap: 4px; }
.username {
  font-weight: 700; font-size: 14.5px; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: var(--font-display);
  transition: color var(--ease);
}
.username:hover { color: var(--accent2); }
.post-meta { font-size: 12px; color: var(--text3); white-space: nowrap; }
.post-text {
  font-size: 15px; line-height: 1.6; margin-bottom: 10px; color: var(--text);
  word-break: break-word; white-space: pre-wrap;
}
.post-edited { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-style: italic; }
.mention-link {
  color: var(--accent2); font-weight: 600; cursor: pointer;
  border-radius: 3px; padding: 0 1px;
  transition: background var(--ease);
}
.mention-link:hover { background: rgba(var(--accent2-rgb),.1); }

/* ── Service box ───────────────────────────────────── */
.service-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 14px; margin-bottom: 10px;
  transition: box-shadow var(--ease);
}
.service-box:hover { box-shadow: var(--shadow-sm); }
.service-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--accent2);
  margin-bottom: 6px;
}
.service-label .material-symbols-outlined { font-size: 14px; }
.service-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; font-family: var(--font-display); }
.service-desc { font-size: 13.5px; color: var(--text2); line-height: 1.5; }
.service-price {
  font-size: 13px; font-weight: 700; color: var(--green);
  margin-top: 8px; display: inline-block;
  background: rgba(34,197,94,.1); padding: 2px 8px;
  border-radius: var(--r-pill);
}

/* ── Popular tag ───────────────────────────────────── */
.popular-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 800; letter-spacing: .04em;
  text-transform: uppercase; color: var(--orange);
  background: rgba(249,115,22,.1); border-radius: var(--r-pill);
  padding: 2px 8px; margin-bottom: 6px;
}
.popular-tag .material-symbols-outlined { font-size: 12px; }

/* ── Post actions ──────────────────────────────────── */
.actions { display: flex; gap: 0; margin-top: 2px; margin-left: -8px; }
.action-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px; border-radius: var(--r-pill);
  color: var(--text3); font-size: 13px; font-weight: 600;
  transition: color var(--ease), background var(--ease), transform var(--spring-fast);
}
.action-btn:hover { background: var(--bg2); color: var(--text); }
.action-btn:active { transform: scale(.88); }
.action-btn.liked { color: var(--red); }
.action-btn.liked .material-symbols-outlined { animation: heartPop .3s ease; }
.action-btn .material-symbols-outlined { font-size: 19px; }
.contact-btn:hover { color: var(--accent2); }
.more-btn {
  color: var(--text3); padding: 4px; border-radius: 50%;
  transition: background var(--ease), transform var(--spring-fast);
}
.more-btn:hover { background: var(--bg2); color: var(--text); }
.more-btn:active { transform: scale(.85); }
.more-btn .material-symbols-outlined { font-size: 20px; }

/* ── Activity separator ────────────────────────────── */
.activity-sep {
